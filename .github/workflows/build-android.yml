# Android smoke build. Same caveat as Linux/Windows — symbolic_math_bridge
# is iOS/macOS only, so the Android app runs in degraded mode.
# Output: a debug APK (unsigned). Users can sideload via adb.

name: Build Android

on:
  push:
    branches: [main, latex-input-field]
  pull_request:
    branches: [main, latex-input-field]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_calc-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
