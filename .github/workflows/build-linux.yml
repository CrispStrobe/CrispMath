# Linux smoke build. The SymEngine bridge plugin only supports iOS/macOS,
# so on Linux the FFI lookup fails and CalculatorEngine falls back to
# returning "Error: <op> requires native library" for any symbolic call.
# The UI, persistence, plot rendering, plane/conic analysis, and the
# pure-Dart vector/tensor math all work. We document the limitation
# instead of failing the build.

name: Build Linux

on:
  push:
    branches: [main, latex-input-field]
  pull_request:
    branches: [main, latex-input-field]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Tar the bundle
        run: |
          cd build/linux/x64/release/
          tar czf ../../../../crisp_math-linux-x64.tar.gz bundle

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_math-linux-x64
          path: crisp_math-linux-x64.tar.gz
          retention-days: 14
