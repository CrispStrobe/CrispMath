# Web build + Vercel deploy (PLAN P10 Path A). The browser target ships
# the reduced-capability build: pure-Dart calculator / statistics / matrices
# / Sudoku-CSP / units work, while the SymEngine CAS, MPFR precision, and
# FLINT number-theory paths degrade to "Error: requires native library"
# (no dart:ffi in the browser). The default `flutter build web` is dart2js —
# correct everywhere; dart_csp falls back to its slower list/interval rep.
#
# Every push/PR builds the bundle and uploads it as an artifact (needs no
# secrets). Production deploys to https://crisp-math.vercel.app happen
# only on release tags (`v*`) — Vercel's free tier caps deployments at
# 100/day, so per-push deploys are handled by GitHub Pages instead (see
# deploy-pages.yml). The deploy also needs the Vercel secrets set, so the
# workflow stays green on forks / before secrets are configured.
#
# Required repo secrets for the deploy step (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — account token (account `crispstrobe`)
#   VERCEL_ORG_ID      — from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID  — likewise (project `crisp-math`)
# The Vercel CLI auto-reads VERCEL_ORG_ID / VERCEL_PROJECT_ID from the env,
# so no `vercel link` / `vercel pull` is needed in CI.

name: Build Web

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Job-level env so the deploy step's `if:` can test for a configured
    # token and skip gracefully when secrets are absent.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned in lockstep with ci.yml — format/build-rule drift
          # between Dart versions otherwise flakes CI on every push.
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build web (release, dart2js)
        run: flutter build web --release

      - name: Add Vercel SPA-rewrite config
        run: cp vercel.json build/web/vercel.json

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_math-web
          path: build/web
          retention-days: 14

      # Production deploy on release tags only (`v*`). Keeping Vercel off
      # the per-push path keeps us well under its free-tier 100/day cap —
      # GitHub Pages (deploy-pages.yml) is the per-push preview channel.
      - name: Deploy to Vercel (production)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel@latest
          vercel deploy build/web --prod --yes --archive=tgz --token="$VERCEL_TOKEN"
