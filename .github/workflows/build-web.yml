# Web build + Vercel deploy (PLAN P10 Path A). The browser target ships
# the reduced-capability build: pure-Dart calculator / statistics / matrices
# / Sudoku-CSP / units work, while the SymEngine CAS, MPFR precision, and
# FLINT number-theory paths degrade to "Error: requires native library"
# (no dart:ffi in the browser). The default `flutter build web` is dart2js —
# correct everywhere; dart_csp falls back to its slower list/interval rep.
#
# Every push/PR builds the bundle and uploads it as an artifact (needs no
# secrets). Pushes to `main` additionally deploy to production at
# https://crisp-math.vercel.app — but only when the Vercel secrets are set,
# so the workflow stays green on forks / before secrets are configured.
#
# Required repo secrets for the deploy step (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — account token (account `crispstrobe`)
#   VERCEL_ORG_ID      — from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID  — likewise (project `crisp-math`)
# The Vercel CLI auto-reads VERCEL_ORG_ID / VERCEL_PROJECT_ID from the env,
# so no `vercel link` / `vercel pull` is needed in CI.

name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Job-level env so the deploy step's `if:` can test for a configured
    # token and skip gracefully when secrets are absent.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned in lockstep with ci.yml — format/build-rule drift
          # between Dart versions otherwise flakes CI on every push.
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build web (release, dart2js)
        run: flutter build web --release

      - name: Add Vercel SPA-rewrite config
        run: cp vercel.json build/web/vercel.json

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_math-web
          path: build/web
          retention-days: 14

      - name: Deploy to Vercel (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel@latest
          # The build + tests have already passed by this point; the bundle
          # is uploaded as an artifact regardless. Vercel's free tier caps
          # deployments at 100/day, so on a heavy-push day the deploy can
          # hit `api-deployments-free-per-day` — an external quota, not a
          # regression. Treat *only* that rate-limit as a soft failure so a
          # green build isn't turned red by the daily cap; any other deploy
          # error still fails the job.
          set -o pipefail
          if vercel deploy build/web --prod --yes --archive=tgz \
              --token="$VERCEL_TOKEN" 2>&1 | tee vercel.log; then
            echo "Vercel deploy succeeded."
          else
            if grep -q 'api-deployments-free-per-day' vercel.log; then
              echo "::warning::Vercel free-tier daily deploy cap reached — skipping deploy (build artifact still uploaded). Retries on the next push after the 24h window."
            else
              echo "::error::Vercel deploy failed for a non-quota reason."
              exit 1
            fi
          fi
