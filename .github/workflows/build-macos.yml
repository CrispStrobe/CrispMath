# macOS smoke build — runs on PRs and pushes to main. Confirms the native
# SymEngine bridge links correctly. Produces an unsigned `.app` as a build
# artifact so reviewers can grab and run it locally without a checkout.

name: Build macOS

on:
  push:
    branches: [main, latex-input-field]
  pull_request:
    branches: [main, latex-input-field]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build macOS (debug, unsigned)
        # GitHub macOS runners ship preset GEM_HOME / GEM_PATH that point at
        # a stale gem cache; CocoaPods refuses to start. We `unset` them
        # inline rather than via `env:` (empty strings still trip rubygems).
        run: |
          unset GEM_HOME GEM_PATH GEM_ROOT RUBY_ROOT RUBYOPT RUBY_ENGINE RUBY_VERSION
          flutter build macos --debug

      - name: Verify SymEngine symbols are linked
        # Scan every Mach-O in the .app bundle. Different Flutter versions
        # put the Dart VM in different files (`crisp_calc.debug.dylib` on
        # some, embedded in the main binary on others), so we just look
        # everywhere instead of guessing a single path.
        run: |
          set -eu
          APP="build/macos/Build/Products/Debug/crisp_calc.app"
          ls -la "$APP/Contents/MacOS"
          TOTAL=0
          for bin in $(find "$APP" -type f -perm -u+x); do
            count=$(nm "$bin" 2>/dev/null | grep -c flutter_symengine || true)
            if [ "$count" -gt 0 ]; then
              echo "  $bin: $count"
              TOTAL=$((TOTAL + count))
            fi
          done
          echo "Total SymEngine symbols across bundle: $TOTAL"
          if [ "$TOTAL" -lt 30 ]; then
            echo "::error::Expected >= 30 SymEngine symbols across bundle, found $TOTAL"
            exit 1
          fi

      - name: Zip the .app for download
        run: |
          cd build/macos/Build/Products/Debug
          zip -ryq ../../../../../crisp_calc-macos-debug.zip crisp_calc.app

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_calc-macos-debug
          path: crisp_calc-macos-debug.zip
          retention-days: 14
