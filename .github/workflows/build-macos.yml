# macOS smoke build — runs on PRs and pushes to main. Builds in release
# to exercise the same link path that HISTORY round 13 fixed (the
# bridge's +load asm-clobber keep-alive lives in the plugin and can
# regress when we bump the bridge ref). After the build, we verify
# 45+ flutter_symengine_* symbols actually landed in the binary, then
# run the headless matrix diagnostic to confirm the FFI matrix path
# round-trips end-to-end. The resulting unsigned .app is uploaded as a
# build artifact so reviewers can grab and run it locally.

name: Build macOS

on:
  push:
    branches: [main, latex-input-field]
  pull_request:
    branches: [main, latex-input-field]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build macOS (release, unsigned)
        # GitHub macOS runners ship preset GEM_HOME / GEM_PATH that point at
        # a stale gem cache; CocoaPods refuses to start. We `unset` them
        # inline rather than via `env:` (empty strings still trip rubygems).
        run: |
          unset GEM_HOME GEM_PATH GEM_ROOT RUBY_ROOT RUBYOPT RUBY_ENGINE RUBY_VERSION
          flutter build macos --release

      - name: Verify SymEngine symbols are linked
        # Scan every Mach-O in the .app bundle. Different Flutter versions
        # put the Dart VM in different files, so we just look everywhere
        # instead of guessing a single path. Release builds with the bridge
        # ref from HISTORY round 13 land all 45 flutter_symengine_* symbols
        # in the main binary; we threshold at >= 30 to leave room for the
        # bridge to grow without making CI brittle.
        run: |
          set -eu
          APP="build/macos/Build/Products/Release/crisp_math.app"
          ls -la "$APP/Contents/MacOS"
          TOTAL=0
          for bin in $(find "$APP" -type f -perm -u+x); do
            count=$(nm "$bin" 2>/dev/null | grep -c flutter_symengine || true)
            if [ "$count" -gt 0 ]; then
              echo "  $bin: $count"
              TOTAL=$((TOTAL + count))
            fi
          done
          echo "Total SymEngine symbols across bundle: $TOTAL"
          if [ "$TOTAL" -lt 30 ]; then
            echo "::error::Expected >= 30 SymEngine symbols across bundle, found $TOTAL"
            exit 1
          fi

      - name: Run matrix self-test against the release binary
        # Headless invocation of the matrix diagnostic battery (det / inv /
        # transpose / + / * across 2x2 and 3x3). Confirms the FFI matrix
        # bindings actually round-trip, not just that the symbols are
        # statically present. The binary exits non-zero on any failure.
        run: |
          set -eu
          BIN="build/macos/Build/Products/Release/crisp_math.app/Contents/MacOS/crisp_math"
          CRISPMATH_DIAGNOSTIC=matrix "$BIN"

      - name: Run step engine self-test against the release binary
        # Headless invocation of the step-by-step diagnostic battery
        # (diff / integrate / solve with ~28 examples). Confirms the
        # step engine's recursive rule walker produces canonical
        # answers that match SymEngine, and catches regressions when
        # SymEngine's output format shifts between bridge versions.
        run: |
          set -eu
          BIN="build/macos/Build/Products/Release/crisp_math.app/Contents/MacOS/crisp_math"
          CRISPMATH_DIAGNOSTIC=steps "$BIN"

      - name: Zip the .app for download
        run: |
          cd build/macos/Build/Products/Release
          zip -ryq ../../../../../crisp_math-macos-release.zip crisp_math.app

      - uses: actions/upload-artifact@v4
        with:
          name: crisp_math-macos-release
          path: crisp_math-macos-release.zip
          retention-days: 14
