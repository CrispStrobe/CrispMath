name: crisp_calc
description: CAS calculator with SymEngine
publish_to: 'none'

version: 0.5.0+1

environment:
  # 3.3.0 floor: package:web ^1.0.0 (pulled in by the symbolic_math_bridge
  # WASM web impl via dart:js_interop) requires Dart >= 3.3.0.
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Add the Cupertino Icons font. For CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  # Removing ffi dependency, now handled by the plugin
  # ffi: ^2.1.0

  # Use our symbolic math bridge. Pinned to a git ref so CI builds (which
  # don't have a sibling directory) can fetch the same source as local dev.
  # Bump the `ref:` when the bridge gets new entry points the app needs.
  symbolic_math_bridge:
    git:
      url: https://github.com/CrispStrobe/symbolic_math_bridge.git
      ref: "8916148"   # bridge feat/series-linsolve: series (Taylor) + linsolve, v1.4.0

  # Constraint Satisfaction Problem solver — pure Dart, no native
  # deps. Powers the Analysis-hub "Constraints" module (Diophantine
  # equations, cryptarithms in V1; Sudoku and a generic mini-DSL in
  # follow-up rounds). Bump the `ref:` when CSP-engine features we
  # depend on grow.
  dart_csp:
    git:
      url: https://github.com/CrispStrobe/dart_csp.git
      ref: "6b3f5f780930c8a9046eaf5cd37c3783a5b6a1c4"   # main: v2.2.0 (dart2js-safe + propagation-trace API)

  # Math rendering
  flutter_math_fork: ^0.7.2

  # Material Design Icons
  material_design_icons_flutter: ^7.0.7296

  # Persistent app settings (locale, number format, etc.)
  shared_preferences: ^2.2.0

  # About screen: app version + tappable contact links.
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.0

  # PDF export for notepad documents
  pdf: ^3.10.0
  printing: ^5.12.0

  # OCR: camera/gallery image picker for math equation recognition
  image_picker: ^1.0.0

  # CrispEmbed: on-device embedding + math OCR inference via ggml.
  # Provides CrispEmbedOcr (math OCR), CrispOcrPipeline (general OCR),
  # CrispLayout (document layout), CrispTextDetect (text detection).
  crispembed:
    git:
      url: https://github.com/CrispStrobe/CrispEmbed.git
      path: flutter/crispembed
      ref: "a7bd61f"  # v0.12.0: GraniteVision + LightOnOcr + ScanCleanup + SR perf (6x SCUNet, SwinIR fix)

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/licenses/